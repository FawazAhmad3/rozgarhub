<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RozgarHub - Become a Tasker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/navbar.css">
  <style>
    .tasker-hero {
      text-align: center;
      padding: 6rem 0;
      background: linear-gradient(rgba(37, 99, 235, 0.1), rgba(245, 158, 11, 0.1));
      border-radius: 2rem;
      margin-bottom: 4rem;
    }
    .contact-card {
      max-width: 600px;
      margin: 0 auto;
      padding: 3rem;
      text-align: center;
    }
    .contact-info-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 2rem;
      color: var(--primary-color);
    }
  </style>
</head>
<body>
  <header id="navbar-placeholder"></header>
  
  <main class="container">
    <section class="tasker-hero">
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle" class="lead"></p>
    </section>

    <div class="glass-card contact-card">
      <h2 id="contact-title"></h2>
      <p id="contact-desc"></p>
      <div class="contact-info-item">
        <i class="fas fa-phone"></i>
        <span id="contact-phone"></span>
      </div>
      <div class="contact-info-item">
        <i class="fas fa-envelope"></i>
        <span id="contact-email"></span>
      </div>
    </div>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="../js/core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await core.initNavbar();
      await core.initFooter();
      const data = await core.fetchData('../../src/data/become-a-tasker.json');
      if (!data) return;

      document.getElementById('hero-title').innerText = data.header.title;
      document.getElementById('hero-subtitle').innerText = data.header.subtitle;
      document.getElementById('contact-title').innerText = data.contact.title;
      document.getElementById('contact-desc').innerText = data.contact.description;
      document.getElementById('contact-phone').innerText = data.contact.phone;
      document.getElementById('contact-email').innerText = data.contact.email;
    });
  </script>
</body>
</html>
