<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RozgarHub - Reviews</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/navbar.css">
  <style>
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      padding: 4rem 0;
    }
    .review-card {
      padding: 2rem;
    }
    .reviewer-name { font-weight: 800; font-size: 1.2rem; }
    .rating { color: var(--accent-color); margin: 0.5rem 0; }
    .review-date { color: var(--light-text); font-size: 0.85rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <header id="navbar-placeholder"></header>
  
  <main class="container">
    <h1 id="page-title" class="section-title">Customer Reviews</h1>
    <div id="reviews-list" class="reviews-grid"></div>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="../js/core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await core.initNavbar();
      await core.initFooter();
      const data = await core.fetchData('../../src/data/reviews.json');
      if (!data) return;

      document.getElementById('page-title').innerText = data.pageTitle;
      const list = document.getElementById('reviews-list');
      
      data.reviews.forEach(rev => {
        const card = document.createElement('div');
        card.className = 'glass-card review-card';
        card.innerHTML = `
          <div class="reviewer-name">${rev.name}</div>
          <div class="rating">
            ${Array(rev.rating).fill('<i class="fas fa-star"></i>').join('')}
          </div>
          <p class="comment">"${rev.comment}"</p>
          <div class="review-date">${rev.date}</div>
        `;
        list.appendChild(card);
      });
    });
  </script>
</body>
</html>
